<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>高性能ビデオプレイヤー</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <p class="eyebrow">Local Playback</p>
        <h1>高性能ビデオプレイヤー</h1>
        <p class="sub">assets フォルダ内の mp4 / mov を再生</p>
      </header>

      <section class="player-wrap card">
        <video
          id="video"
          class="player"
          controls
          preload="metadata"
          playsinline
          controlslist="nodownload noplaybackrate"
        ></video>
        <div class="meta" id="meta">読み込み待機中...</div>
      </section>

      <section class="playlist-wrap card">
        <h2>再生リスト</h2>
        <p class="hint">ダブルクリック: +5秒 / ←→: 5秒シーク</p>
        <ul id="playlist" class="playlist"></ul>
      </section>
    </main>

    <script src="./app.js" defer></script>
  </body>
</html>
